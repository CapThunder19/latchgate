name: Test minisign signing
on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install minisign
        run: |
          curl -fsSL "https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-linux.tar.gz" \
            | tar xz --strip-components=2 -C /usr/local/bin minisign-linux/x86_64/minisign

      - name: Diagnose key format
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
        run: |
          echo "=== printenv (raw) ==="
          printenv MINISIGN_KEY | wc -l
          printenv MINISIGN_KEY | wc -c
          echo "=== after tr -d \\r ==="
          printenv MINISIGN_KEY | tr -d '\r' | wc -l
          printenv MINISIGN_KEY | tr -d '\r' | wc -c
          echo "=== check for \\r ==="
          if printenv MINISIGN_KEY | grep -qP '\r'; then
            echo "FOUND carriage returns"
          else
            echo "no carriage returns"
          fi

      - name: "CURRENT (broken): printenv without strip"
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          echo "test" > /tmp/test.txt
          printenv MINISIGN_KEY > /tmp/minisign.key
          printenv MINISIGN_PASSWORD | minisign -S -s /tmp/minisign.key -m /tmp/test.txt \
            && echo "SUCCESS" || echo "FAILED"
          rm -f /tmp/minisign.key /tmp/test.txt /tmp/test.txt.minisig

      - name: "FIX: printenv + strip CR"
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          echo "test" > /tmp/test.txt
          printenv MINISIGN_KEY | tr -d '\r' > /tmp/minisign.key
          LINES=$(wc -l < /tmp/minisign.key)
          echo "Key file: ${LINES} lines, $(wc -c < /tmp/minisign.key) bytes"
          printenv MINISIGN_PASSWORD | minisign -S -s /tmp/minisign.key -m /tmp/test.txt
          echo "Signing succeeded — fix is confirmed"
          rm -f /tmp/minisign.key /tmp/test.txt /tmp/test.txt.minisig
